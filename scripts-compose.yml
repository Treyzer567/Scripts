      - /path/to/youtube-source:/youtube-source:rw
      - /path/to/youtube-destination:/youtube-destination:rw

  show-mover:
    command: >
      sh -c "
      apk add --no-cache bash &&
      pip install --no-cache-dir requests &&
      while true; do
        python3 /show-mover.py;
        sleep 3600;
      done
      "
    container_name: show-mover
    image: python:3.11-alpine
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - SONARR_URL=http://your-server-ip:8989
      - SONARR_API_KEY=your_sonarr_api_key
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      - /path/to/scripts/show-mover.py:/show-mover.py
      - /path/to/shows-source:/media-source:rw
      - /path/to/anime-destination:/anime-destination:rw
      - /path/to/tv-destination:/tv-destination:rw
      - /path/to/kidstv-destination:/kidstv-destination:rw
      - /path/to/scripts/show_map.json:/show_map.json:rw

  anime-updater:
    container_name: anime-updater
    image: python:3.11-alpine
    # Installs requests, then runs the script every hour (3600 seconds)
    command: sh -c "pip install requests && while true; do python3 /scripts/anime_profile_updater.py; sleep 3600; done"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - SONARR_URL=http://your-server-ip:8989
      - SONARR_API_KEY=your_sonarr_api_key
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      # Mount the folder containing both the .py script and the .json map
      - /path/to/scripts:/scripts:rw
    
networks:
 media-net:
   external: true
