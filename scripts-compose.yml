version: "3.9"
services:  
  music-mover:
    command: sh -c "apk add --no-cache bash && while true; do python3 /music-mover.py; sleep 3600; done"
    container_name: music-mover
    image: python:3.11-alpine
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      - /path/to/scripts/music-mover.py:/music-mover.py:ro
      - /path/to/music-source:/music-source:rw
      - /path/to/music-destination:/music-destination:rw

  comic-mover:
